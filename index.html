<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTTV — Hashtag TV</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- PANTALLA 1: Gestor de Listas -->
<div id="screen-lists" class="screen active">
    <div class="lists-header">
        <h1 class="logo">HTTV<span>.</span></h1>
        <p class="subtitle">Elige o crea tu lista de canales</p>
    </div>

    <div class="lists-body">
        <div id="lists-container"></div>
        <button id="btn-add-list" class="btn-add">+ Nueva Lista</button>
    </div>

    <div class="lists-footer">
        <div class="interval-control">
            <label>Cambio cada:</label>
            <select id="interval-select">
                <option value="10000">10 seg</option>
                <option value="30000">30 seg</option>
                <option value="60000" selected>1 min</option>
                <option value="120000">2 min</option>
                <option value="300000">5 min</option>
            </select>
        </div>
        <button id="btn-play" class="btn-play" disabled>▶ SINTONIZAR</button>
    </div>
</div>

<!-- PANTALLA 2: Cargando -->
<div id="screen-loading" class="screen">
    <div class="loading-content">
        <div class="loader-ring"></div>
        <div id="load-perc" class="load-perc">0%</div>
        <div id="load-status" class="load-status">Buscando videos...</div>
    </div>
</div>

<!-- PANTALLA 3: Reproductor -->
<div id="screen-player" class="screen">
    <div class="scanlines"></div>
    <div id="player-wrap">
        <div id="player"></div>
    </div>

    <div class="player-hud-top">
        <button id="btn-back" class="btn-hud">← Listas</button>
        <select id="list-switcher" class="btn-hud list-switcher"></select>
        <div class="logo-small">HTTV<span>.</span></div>
    </div>

    <div class="player-hud-bottom">
        <div id="now-playing" class="now-playing">#canal</div>
        <div class="player-controls">
            <div id="progress-area">
                <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
                <div id="countdown" class="countdown hidden">--:--</div>
            </div>
            <select id="interval-select-player" class="btn-hud interval-player">
                <option value="10000">10 seg</option>
                <option value="30000">30 seg</option>
                <option value="60000" selected>1 min</option>
                <option value="120000">2 min</option>
                <option value="300000">5 min</option>
                <option value="0">Manual</option>
            </select>
            <button id="btn-next-video" class="btn-hud">▶▶</button>
            <button id="btn-save" class="btn-hud btn-save">♥ Guardar</button>
            <a id="btn-yt-link" href="#" target="_blank" class="btn-hud">YT ↗</a>
        </div>
    </div>
</div>

<script src="main.js"></script>
</body>
</html>
